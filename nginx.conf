# Определяем группу бэкенд-серверов
upstream app_backend {
    # Для round-robin (по умолчанию) просто перечислите серверы:
    server localhost:3000;
    # server localhost:3001;
    # server localhost:3002;

    # Опционально: можно указать вес, least_conn, ip_hash и т.д.
    # least_conn;
    # server localhost:3001 weight=2;
}

server {
    listen 80;
    server_name _; # принимает запросы на любой домен/IP

    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Передаём реальные данные клиента на бэкенд
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты (опционально)
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}